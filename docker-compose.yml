version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: dev-team-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dev_team
      MYSQL_USER: dev_team
      MYSQL_PASSWORD: dev_team_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application
  app:
    build: .
    container_name: dev-team-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: mysql://dev_team:dev_team_pass@mysql:3306/dev_team
      JWT_SECRET: dev-secret-key-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_API_URL: http://ollama:11434
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      STORAGE_PROVIDER: local
      STORAGE_PATH: /data/uploads
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Ollama (Local LLM)
  ollama:
    image: ollama/ollama
    container_name: dev-team-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    # Uncomment to pull models on startup
    # command: ollama pull mistral && ollama serve

  # MinIO (S3-compatible storage)
  minio:
    image: minio/minio
    container_name: dev-team-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MailHog (Email testing)
  mailhog:
    image: mailhog/mailhog
    container_name: dev-team-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

  # Redis (Optional - for session storage)
  redis:
    image: redis:7-alpine
    container_name: dev-team-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  ollama_data:
  minio_data:
  redis_data:

networks:
  default:
    name: dev-team-network
